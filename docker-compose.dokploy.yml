name: orderforge

services:
  postgres:
    image: postgres:16-alpine
    container_name: orderforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME}
    volumes:
      - orderforge_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-keycloak.sh:/docker-entrypoint-initdb.d/10-init-keycloak.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: orderforge-keycloak
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: start-dev --http-port=8080 --hostname-strict=false --import-realm
    volumes:
      - ./OrderForge.AppHost/Keycloak/themes:/opt/keycloak/themes:ro
      - ./OrderForge.AppHost/Keycloak/orderforge-realm.json:/opt/keycloak/data/import/orderforge-realm.json:ro
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: auth.orderforge.co.uk
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`auth.orderforge.co.uk`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls.certresolver=letsencrypt"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"

  orderforge.api:
    build:
      context: .
      dockerfile: OrderForge.Api/Dockerfile
    container_name: orderforge-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Authentication__Authority: "https://auth.orderforge.co.uk/realms/${KEYCLOAK_REALM}"
      Authentication__Audience: ${JWT_AUDIENCE}
      KeycloakAdmin__BaseUrl: "http://keycloak:8080"
      KeycloakAdmin__Realm: ${KEYCLOAK_REALM}
      KeycloakAdmin__ClientId: "orderforge-admin-api"
      KeycloakAdmin__ClientSecret: ${KEYCLOAK_ADMIN_API_SECRET}
      Cors__Origins__0: "https://app.orderforge.co.uk"
      BetterStack__SourceToken: ${BETTERSTACK_SOURCE_TOKEN}
      BunnyStorage__StorageZoneName: ${BUNNY_STORAGE_ZONE_NAME}
      BunnyStorage__ApiAccessKey: ${BUNNY_API_ACCESS_KEY}
      BunnyStorage__Region: ${BUNNY_REGION:-de}
      BunnyStorage__PublicBaseUrl: "https://images.orderforge.co.uk"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.orderforge.co.uk`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=8080"

  orderforge.client:
    build:
      context: .
      dockerfile: OrderForge.Client/Dockerfile
      target: final
    container_name: orderforge-client
    restart: unless-stopped
    depends_on:
      - orderforge.api
    environment:
      API_BASE_URL: "https://api.orderforge.co.uk/"
      OIDC_AUTHORITY: "https://auth.orderforge.co.uk/realms/${KEYCLOAK_REALM}"
      OIDC_CLIENT_ID: "orderforge-blazor"
      KEYCLOAK_AUTH_SERVER_URL: "https://auth.orderforge.co.uk"
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_FORGOT_PASSWORD_CLIENT_ID: "orderforge-blazor"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.client.rule=Host(`app.orderforge.co.uk`)"
      - "traefik.http.routers.client.entrypoints=websecure"
      - "traefik.http.routers.client.tls.certresolver=letsencrypt"
      - "traefik.http.services.client.loadbalancer.server.port=80"

volumes:
  orderforge_pgdata:
