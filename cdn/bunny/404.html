<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Not Found - Order Forge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family:
                ui-sans-serif,
                system-ui,
                'Segoe UI',
                Roboto,
                'Helvetica Neue',
                Arial,
                sans-serif;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900 antialiased flex flex-col">
    <header class="border-b border-slate-800/80 bg-[#0f172a] shadow-lg">
        <div class="mx-auto flex max-w-screen-2xl items-center gap-3 px-4 py-3 sm:px-6 lg:px-8">
            <span class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg bg-emerald-500 shadow-sm ring-1 ring-emerald-400/30" aria-hidden="true">
                <svg class="h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m21 7.5-2.25-1.313M21 7.5v2.25m0-2.25-9-5.25m9 5.25-9 5.25M3 7.5l9-5.25m0 0-9 5.25m9-5.25v2.25m0-2.25 9 5.25m-9-5.25 9 5.25m0-2.25V7.5m0 0v2.25" />
                </svg>
            </span>
            <span class="text-lg font-bold tracking-tight text-white">Order Forge</span>
        </div>
    </header>

    <main class="flex flex-1 items-center justify-center px-6 py-12">
        <div class="max-w-md text-center">
            <div class="mb-8">
                <div class="inline-flex h-32 w-32 items-center justify-center rounded-2xl bg-emerald-500 text-5xl font-bold text-white shadow-sm ring-1 ring-emerald-400/30" aria-hidden="true">
                    404
                </div>
            </div>

            <h1 class="text-3xl font-semibold tracking-tight text-slate-900">Image not found</h1>
            <p class="mt-3 text-slate-600">
                Sorry, the image you're looking for is currently unavailable.
            </p>

            <div class="mt-8 flex justify-center">
                <a href="javascript:history.back()"
                   class="inline-flex items-center justify-center rounded-xl bg-emerald-600 px-6 py-3 text-base font-medium text-white no-underline shadow-sm outline-none ring-emerald-500/50 transition-colors hover:bg-emerald-700 focus-visible:ring-2">
                    Go back
                </a>
            </div>

            <p class="mt-12 text-xs text-slate-500">
                Order Forge — B2B wholesale portal
            </p>
        </div>
    </main>
</body>
</html>
