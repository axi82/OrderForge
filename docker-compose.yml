# Single Postgres holds both the app DB (POSTGRES_*) and Keycloak's DB (KEYCLOAK_DB_*).
# If you already had a data volume from the old two-Postgres setup, run:
#   docker compose down -v
# then up again so init-keycloak.sh runs, or create the Keycloak role/DB manually.

name: orderforge

services:
  postgres:
    image: postgres:16-alpine
    container_name: orderforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      KEYCLOAK_DB_USER: ${KEYCLOAK_DB_USER}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KEYCLOAK_DB_NAME: ${KEYCLOAK_DB_NAME}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - orderforge_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-keycloak.sh:/docker-entrypoint-initdb.d/10-init-keycloak.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: orderforge-keycloak
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    command: start-dev --http-port=8080 --hostname-strict=false
    volumes:
      - ./OrderForge.AppHost/Keycloak/themes:/opt/keycloak/themes:ro
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      # Dev: pick up theme/CSS changes without stale cache (disable in production).
      KC_SPI_THEME_CACHE_THEMES: "false"
      KC_SPI_THEME_CACHE_TEMPLATES: "false"
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"

  # Seq: structured log ingestion + UI. Individual license (ACCEPT_EULA=Y). UI/API on container port 80 → host 5341.
  # Seq 2025+ needs an initial admin password (SEQ_FIRSTRUN_ADMINPASSWORD) or SEQ_FIRSTRUN_NOAUTHENTICATION=true.
  # Override with SEQ_ADMIN_PASSWORD in .env. If Seq previously failed mid-migration, remove volume orderforge_seqdata once.
  seq:
    image: datalust/seq:latest
    container_name: orderforge-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_ADMIN_PASSWORD:-dev-seq-admin-change-me}
    ports:
      - "${SEQ_PORT:-5341}:80"
    volumes:
      - orderforge_seqdata:/data

  # Service name must match Visual Studio Docker Compose (launchSettings + docker-compose.override.yml).
  orderforge.api:
    build:
      context: .
      dockerfile: OrderForge.Api/Dockerfile
    container_name: orderforge-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      seq:
        condition: service_started
    ports:
      - "${API_PORT:-5280}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Authentication__Authority: "http://keycloak:8080/realms/${KEYCLOAK_REALM}"
      Authentication__Audience: ${JWT_AUDIENCE}
      KeycloakAdmin__BaseUrl: "http://keycloak:8080"
      KeycloakAdmin__Realm: ${KEYCLOAK_REALM}
      KeycloakAdmin__ClientId: "orderforge-admin-api"
      KeycloakAdmin__ClientSecret: ${KEYCLOAK_ADMIN_API_SECRET:-orderforge-admin-api-dev-secret-change-in-prod}
      Cors__Origins__0: "http://localhost:${CLIENT_PORT}"
      Cors__Origins__1: "http://127.0.0.1:${CLIENT_PORT}"
      Seq__ServerUrl: "http://seq:80"
    volumes:
      - orderforge_apilogs:/app/logs

  # Name must match Visual Studio (OrderForge.Client → orderforge.client) for compose tooling + launchSettings.
  orderforge.client:
    build:
      context: .
      dockerfile: OrderForge.Client/Dockerfile
      target: final
    container_name: orderforge-client
    restart: unless-stopped
    depends_on:
      - orderforge.api
    environment:
      ASPNETCORE_URLS: http://+:80
      ASPNETCORE_HTTP_PORTS: 80
    ports:
      - "${CLIENT_PORT:-5281}:80"

volumes:
  orderforge_pgdata:
  orderforge_seqdata:
  orderforge_apilogs:
